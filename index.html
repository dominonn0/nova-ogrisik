    <style>
        /* ========== ПОЛНОСТЬЮ ОРИГИНАЛЬНЫЕ СТИЛИ (НИЧЕГО НЕ ВЫРЕЗАНО) ========== */

        body.dark-theme .auth-input { background: #463c35; border-color: #6f5d51; color: #f0e2d5; }
        .auth-btn { width: 100%; padding: 16px; border: none; border-radius: 100px; font-size: 18px; font-weight: 600; background: #ff8c42; color: white; cursor: pointer; margin: 24px 0 12px; transition: 0.2s; }

        .tabs-container { display: flex; padding: 0 20px 10px; gap: 20px; border-bottom: 1px solid #f0daca; }

        .tab-btn.active { color: #ff8c42; border-bottom-color: #ff8c42; }
        .chats-list { flex: 1; overflow-y: auto; padding: 8px 12px 20px; scrollbar-width: thin; }
        .chat-item { display: flex; align-items: center; gap: 14px; padding: 12px 16px; border-radius: 20px; margin: 4px 0; cursor: pointer; position: relative; }
        .chat-item:hover { background: #ffede1; }

        body.dark-theme .chat-item.active { background: #a06f4c; }
        .chat-avatar { width: 56px; height: 56px; border-radius: 50%; background: #ffb27a; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; font-weight: 600; flex-shrink: 0; overflow: hidden; }
        .chat-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .chat-info { flex: 1; overflow: hidden; }
        .chat-name { font-weight: 600; font-size: 17px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 6px; }
        .online-indicator { width: 10px; height: 10px; border-radius: 50%; background: #4caf50; margin-left: 5px; display: inline-block; }

        .messages-header { padding: 20px 30px; background: #fffaf5; border-bottom: 1px solid #f0daca; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        body.dark-theme .messages-header { background: #403a34; border-bottom-color: #605347; }
        .messages-header .chat-name { font-size: 22px; cursor: pointer; }
        .back-button { font-size: 24px; color: #ff8c42; cursor: pointer; margin-right: 10px; }
        .messages-area { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 16px; }
        .message-wrapper { position: relative; max-width: 70%; display: flex; flex-direction: column; }
        .message-wrapper.own { align-self: flex-end; }
        .bubble { padding: 14px 20px; border-radius: 26px; background: var(--message-other-bg, #ffeede); color: var(--text-color, #2e2b28); font-size: 15px; word-wrap: break-word; }
        .message-wrapper.own .bubble { background: var(--message-own-bg, #ffb77c); }

        .sticker-image { max-width: 128px; border-radius: 10px; cursor: pointer; }
        .message-meta { font-size: 12px; color: #b6987f; margin-top: 4px; cursor: pointer; }
        .message-input-area { padding: 20px 30px 10px; background: #fffaf5; border-top: 1px solid #f0daca; display: flex; flex-direction: column; }
        .input-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .message-input-area input { flex: 1; padding: 16px 24px; border-radius: 40px; border: 1px solid #ffd9be; background: white; outline: none; }
        .attach-btn, .emoji-btn, .sticker-btn, .calendar-btn, .voice-cmd-btn, .canvas-room-btn {
            width: 50px; height: 50px; border-radius: 50%; border: none; background: #ff8c42; color: white; font-size: 20px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; margin: 0 2px;
        }
        .send-btn, .record-btn { width: 58px; height: 58px; border-radius: 50%; border: none; background: #ff8c42; color: white; font-size: 24px; cursor: pointer; }
        .record-btn.recording { animation: pulse 0.6s infinite; background: #ff3b30; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .image-previews { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .preview-item { position: relative; width: 80px; height: 80px; border-radius: 10px; overflow: hidden; }

        .emoji-picker, .sticker-picker { display: flex; gap: 8px; padding: 10px; background: #fff; border-radius: 30px; margin-top: 10px; flex-wrap: wrap; max-height: 200px; overflow-y: auto; }
        .emoji-item { font-size: 24px; cursor: pointer; padding: 5px; border-radius: 10px; }
        .sticker-item { width: 60px; height: 60px; border-radius: 10px; cursor: pointer; object-fit: cover; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); align-items: center; justify-content: center; z-index: 2000; }
        .modal-overlay.active { display: flex; }
        .modal-card { background: #fffaf2; border-radius: 40px; width: 600px; max-width: 90%; padding: 36px; max-height: 90vh; overflow-y: auto; }
        body.dark-theme .modal-card { background: #4c433c; color: #f0e2d5; }
        .modal-card h2 { font-size: 32px; color: #ff8c42; margin-bottom: 24px; }
        .modal-actions { display: flex; gap: 16px; margin-top: 24px; flex-wrap: wrap; }
        .modal-actions button { flex: 1; padding: 16px; border-radius: 40px; font-weight: 600; cursor: pointer; }
        .primary { background: #ff8c42; color: white; border: none; }
        .secondary { background: #e7d9ce; color: #5a4b3f; border: none; }
        .delete-btn { background: #d9534f; color: white; }
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 10000; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: #333; color: white; padding: 12px 20px; border-radius: 30px; animation: slideIn 0.3s; }
        .hidden { display: none !important; }
        .fab-button { margin: 16px 20px 24px; background: #ff8c42; border: none; border-radius: 60px; padding: 16px 24px; color: white; font-size: 18px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; }
        .custom-file-upload { display: inline-block; padding: 12px 20px; background: #ff8c42; color: white; border-radius: 40px; font-size: 16px; font-weight: 600; cursor: pointer; margin: 10px 0; }
        input[type="file"] { display: none; }
        .admin-badge { background: #ffd966; color: #8e5c1a; border-radius: 12px; padding: 2px 8px; font-size: 12px; margin-left: 8px; }
        .bio-text { font-size: 14px; color: #5e4b3c; margin: 10px 0; padding: 10px; background: #fff0e4; border-radius: 20px; }
        .draw-tools { display: flex; gap: 10px; margin: 15px 0; flex-wrap: wrap; align-items: center; }
        .draw-tools button { background: #ff8c42; border: none; padding: 8px 16px; border-radius: 30px; color: white; cursor: pointer; }
        .draw-tools input { width: 60px; }
        #drawCanvas { border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); background: white; cursor: crosshair; max-width: 100%; height: auto; }
    </style>
</head>
<body>
<div id="app"></div>
<div class="toast-container" id="toast-container"></div>

<script>
// ======================== ВАШИ ДАННЫЕ SUPABASE ========================
const SUPABASE_URL = 'https://ejpxgtwnovcrjybtssyv.supabase.co';     // БЕЗ /rest/v1/
const SUPABASE_ANON_KEY = 'sb_publishable_C-cbwbUsyu4tdKyG97Ctxw_y5TSX9gR';
// ==========================================================================

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Глобальные переменные
let currentUser = null;
let users = [];
let channels = [];
let groups = [];
let chats = [];
let messages = [];
let friendRequests = [];
let bots = [];
let customThemes = [];
let events = [];
let activeChatId = null, activeGroupId = null, activeChannelId = null;
let activeTab = 'chats';
let currentTheme = 'light';
let pendingImages = [];
let searchQuery = '';
let searchVisible = false;
let typingTimeouts = {};
let lastTypingSent = {};
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let pressTimer = null;
let recognition = null;
let activeCanvasRoom = null;
let canvasRoomData = {};

// Подписки Realtime
let messagesSubscription = null;
let canvasSubscription = null;
let groupsSubscription = null;
let chatsSubscription = null;

// Вспомогательные функции
function showToast(msg, dur=3000, type='info'){
    let c=document.getElementById('toast-container');
    let t=document.createElement('div');
    t.className=`toast ${type}`;
    t.textContent=msg;
    c.appendChild(t);
    setTimeout(()=>{t.style.opacity='0'; setTimeout(()=>t.remove(),300);},dur);
}
function generateId(){ return crypto.randomUUID(); }
function getUser(id){ return users.find(u=>u.id===id); }
function getUserByUsername(uname){ return users.find(u=>u.username===uname); }
function isOnline(user){ return Date.now() - (user.last_seen||0) < 300000; }
function getUnreadCount(chatId, userId) { return messages.filter(m => m.chat_id === chatId && !(m.read_by && m.read_by.includes(userId)) && m.sender_id !== userId).length; }
function getTotalUnread() { let total=0; chats.forEach(c=>{ if(c.participants?.includes(currentUser.id)) total+=getUnreadCount(c.id,currentUser.id); }); groups.forEach(g=>{ if(g.participants.includes(currentUser.id)) total+=messages.filter(m=>m.group_id===g.id && !(m.read_by?.includes(currentUser.id)) && m.sender_id!==currentUser.id).length; }); return total; }
function canSendInPrivateChat(chatId) { let chat=chats.find(c=>c.id===chatId); if(!chat) return false; let otherId=chat.participants.find(p=>p!==currentUser.id); let other=getUser(otherId); if(!other) return false; if(currentUser.blocked_users?.includes(otherId)) return false; if(other.blocked_users?.includes(currentUser.id)) return false; return true; }
function canSendInGroup(groupId) { let group=groups.find(g=>g.id===groupId); if(!group||!group.participants.includes(currentUser.id)) return false; if(group.slow_mode>0){ let last=group.last_message_time?.[currentUser.id]||0; if(Date.now()-last<group.slow_mode*1000) return false; } return true; }
function canSendInChannel(channelId) { let channel=channels.find(c=>c.id===channelId); if(!channel) return false; return channel.creator_id===currentUser.id || (channel.admins&&channel.admins.includes(currentUser.id)); }
async function updateGroupLastMessageTime(groupId){ let g=groups.find(g=>g.id===groupId); if(g && g.slow_mode>0) { if(!g.last_message_time) g.last_message_time={}; g.last_message_time[currentUser.id]=Date.now(); await supabase.from('groups').update({ last_message_time: g.last_message_time }).eq('id', groupId); } }
function parseMentions(text, contextUsers){ let regex=/@(\w+)/g, match, mentions=[]; while((match=regex.exec(text))!==null){ let username=match[1]; let user=contextUsers.find(u=>u.username===username); if(user && user.id!==currentUser.id) mentions.push(user.id); } return mentions; }
function processBotCommand(bot, chatId, text){ 
    let reply=''; const cmd=text.split(' ')[0].toLowerCase();
    if(cmd==='/help') reply='Доступны: /time, /date, /random, /weather, /echo, /joke, /coin, /roll';
    else if(cmd==='/time') reply=new Date().toLocaleTimeString();
    else if(cmd==='/date') reply=new Date().toLocaleDateString();
    else if(cmd==='/random') reply=Math.floor(Math.random()*100)+1;
    else if(cmd==='/weather') reply='+15°C, облачно';
    else if(cmd==='/echo') reply=text.substring(5).trim()||'...';
    else if(cmd==='/joke') reply='Шутка: Почему программисты путают Хэллоуин и Рождество? Потому что 31 Oct = 25 Dec.';
    else if(cmd==='/coin') reply=Math.random()<0.5?'Орёл':'Решка';
    else if(cmd==='/roll') reply='Выпало: '+(Math.floor(Math.random()*6)+1);
    else reply='Неизвестная команда. Напишите /help';
    supabase.from('messages').insert([{ id:generateId(), chat_id: chatId, sender_id:bot.id, text:reply, type:'text', timestamp:Date.now(), read_by:[bot.id], reactions:{}, mentions:[] }]);
}
async function markMessagesAsRead(chatId, groupId, channelId){
    let toUpdate = [];
    if(chatId) toUpdate = messages.filter(m => m.chat_id === chatId && !m.read_by?.includes(currentUser.id));
    else if(groupId) toUpdate = messages.filter(m => m.group_id === groupId && !m.read_by?.includes(currentUser.id));
    else if(channelId) toUpdate = messages.filter(m => m.channel_id === channelId && !m.read_by?.includes(currentUser.id));
    for(let msg of toUpdate){
        let readBy = msg.read_by || [];
        if(!readBy.includes(currentUser.id)){
            readBy.push(currentUser.id);
            await supabase.from('messages').update({ read_by: readBy }).eq('id', msg.id);
            msg.read_by = readBy;
        }
    }
}
function updateTitleUnread(){ let total=getTotalUnread(); document.title=total?`(${total}) Nova Social`:'Nova Social'; }

// ======================== ИНИЦИАЛИЗАЦИЯ SUPABASE ========================
async function initSupabase() {
    try {
        const { data: { session } } = await supabase.auth.getSession();
        if(session) {
            await loadUserProfile(session.user.id);
            if(currentUser) {
                await loadAllData();
                setupRealtimeSubscriptions();
            }
        }
        renderApp();
    } catch(e) { showToast('Ошибка инициализации: '+e.message,5000,'error'); }
}
async function loadUserProfile(userId) {
    try {
        const { data, error } = await supabase.from('profiles').select('*').eq('id', userId).single();
        if(data && !error) {
            currentUser = data;
            const { data: { user } } = await supabase.auth.getUser();
            if(user) currentUser.email = user.email;
            if(!currentUser.sticker_packs) currentUser.sticker_packs = [{id:'default',name:'Мои стикеры',stickers:[]}];
            if(!currentUser.friends) currentUser.friends = [];
            if(!currentUser.blocked_users) currentUser.blocked_users = [];
            if(!currentUser.bio) currentUser.bio = '';
            if(!currentUser.last_seen) currentUser.last_seen = Date.now();
            if(!currentUser.role) currentUser.role = 'user';
        } else throw error;
    } catch(e) { showToast('Ошибка загрузки профиля: '+e.message,4000,'error'); }
}
async function loadAllData() {
    try {
        const { data: chatsData } = await supabase.from('chats').select('*').contains('participants', [currentUser.id]);
        chats = chatsData || [];
        const { data: groupsData } = await supabase.from('groups').select('*').contains('participants', [currentUser.id]);
        groups = groupsData || [];
        const { data: channelsData } = await supabase.from('channels').select('*').contains('subscribers', [currentUser.id]);
        channels = channelsData || [];
        const { data: messagesData } = await supabase.from('messages').select('*');
        messages = messagesData || [];
        const { data: friendReqs } = await supabase.from('friend_requests').select('*').or(`from_user.eq.${currentUser.id},to_user.eq.${currentUser.id}`);
        friendRequests = friendReqs || [];
        const { data: eventsData } = await supabase.from('events').select('*');
        events = eventsData || [];
        const { data: canvasData } = await supabase.from('canvas_rooms').select('*');
        canvasRoomData = {};
        canvasData?.forEach(room => { canvasRoomData[room.id] = room; });
        const { data: allUsers } = await supabase.from('profiles').select('id, username, name, avatar, bio, role, last_seen');

}
function setupRealtimeSubscriptions() {
    if(messagesSubscription) messagesSubscription.unsubscribe();
    messagesSubscription = supabase.channel('messages-channel')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, async payload => {
            const { eventType, new: newMsg, old: oldMsg } = payload;
            if(eventType === 'INSERT') {
                messages.push(newMsg);
                if((newMsg.chat_id === activeChatId) || (newMsg.group_id === activeGroupId) || (newMsg.channel_id === activeChannelId)) {
                    await markMessagesAsRead(activeChatId, activeGroupId, activeChannelId);
                    renderMessages();
                }
                renderChatsList(); updateTitleUnread();
            } else if(eventType === 'UPDATE') {
                const idx = messages.findIndex(m => m.id === newMsg.id);
                if(idx !== -1) messages[idx] = newMsg;
                if((newMsg.chat_id === activeChatId) || (newMsg.group_id === activeGroupId) || (newMsg.channel_id === activeChannelId)) renderMessages();
            } else if(eventType === 'DELETE') {
                messages = messages.filter(m => m.id !== oldMsg.id);
                renderMessages();
            }
        }).subscribe();
    if(canvasSubscription) canvasSubscription.unsubscribe();
    canvasSubscription = supabase.channel('canvas-channel')
        .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'canvas_rooms' }, payload => {
            const updated = payload.new;
            if(activeCanvasRoom && updated.id === activeCanvasRoom) {
                canvasRoomData[activeCanvasRoom] = updated;
                syncCanvasRoomData();
                const canvas = document.getElementById('collabCanvas');
                if(canvas && updated.canvas_image) {
                    const ctx = canvas.getContext('2d');
                    const img = new Image();
                    img.onload = () => ctx.drawImage(img, 0, 0);
                    img.src = updated.canvas_image;
                }
            }
        }).subscribe();
    if(groupsSubscription) groupsSubscription.unsubscribe();
    groupsSubscription = supabase.channel('groups-channel')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'groups' }, () => loadAllData().then(() => renderChatsList()))
        .subscribe();
    if(chatsSubscription) chatsSubscription.unsubscribe();
    chatsSubscription = supabase.channel('chats-channel')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'chats' }, () => loadAllData().then(() => renderChatsList()))
        .subscribe();
}

// ======================== ФУНКЦИИ ДЛЯ РАБОТЫ СО STORAGE ========================
async function uploadFile(file, bucket, folder = '') {
    const fileExt = file.name.split('.').pop();
    const fileName = `${crypto.randomUUID()}.${fileExt}`;
    const filePath = folder ? `${folder}/${fileName}` : fileName;
    const { data, error } = await supabase.storage.from(bucket).upload(filePath, file);
    if(error) throw error;
    const { data: { publicUrl } } = supabase.storage.from(bucket).getPublicUrl(filePath);
    return publicUrl;
}

async function sendMessage() {
    const input = document.getElementById('messageInput');
    let text = input.value.trim();
    if(!text && pendingImages.length===0) return;
    if(activeChatId && !canSendInPrivateChat(activeChatId)){ showToast('Невозможно отправить (блокировка)',2000,'error'); return; }
    if(activeGroupId && !canSendInGroup(activeGroupId)){ showToast('Слишком часто или вы не в группе',2000,'error'); return; }
    if(activeChannelId && !canSendInChannel(activeChannelId)){ showToast('Нет прав',2000,'error'); return; }
    let mentions=[];
    if(activeGroupId){
        let group=groups.find(g=>g.id===activeGroupId);
        if(group){
            let parts = group.participants.map(id => users.find(u=>u.id===id)).filter(u=>u);
            mentions = parseMentions(text, parts);
        }
    }
    if(pendingImages.length>0){
        for(let img of pendingImages){
            let file = img.file;
            let publicUrl = '';
            try {
                publicUrl = await uploadFile(file, 'chat-images', 'images');
            } catch(e) { showToast('Ошибка загрузки изображения',3000,'error'); continue; }
            let msgData = { id: generateId(), sender_id: currentUser.id, text: publicUrl, type: 'image', timestamp: Date.now(), read_by: [currentUser.id], reactions: {}, mentions: [] };
            if(activeChatId) msgData.chat_id = activeChatId;
            else if(activeGroupId) msgData.group_id = activeGroupId;
            else if(activeChannelId) msgData.channel_id = activeChannelId;
            await supabase.from('messages').insert([msgData]);
            if(activeGroupId) await updateGroupLastMessageTime(activeGroupId);
        }
        pendingImages=[];
        renderImagePreviews();
    }
    if(text){
        let msgData = { id: generateId(), sender_id: currentUser.id, text: text, type: 'text', timestamp: Date.now(), read_by: [currentUser.id], reactions: {}, mentions: mentions };
        if(activeChatId) msgData.chat_id = activeChatId;
        else if(activeGroupId) msgData.group_id = activeGroupId;
        else if(activeChannelId) msgData.channel_id = activeChannelId;
        await supabase.from('messages').insert([msgData]);
        if(activeGroupId) await updateGroupLastMessageTime(activeGroupId);
        if(activeChatId){
            let chat = chats.find(c=>c.id===activeChatId);
            let otherId = chat.participants.find(p=>p!==currentUser.id);
            let other = users.find(u=>u.id===otherId);
            if(other && other.role === 'bot') setTimeout(()=>processBotCommand(other, activeChatId, text), 600);
        }
    }
    input.value='';
    renderMessages();
    renderChatsList();
    updateTitleUnread();
}
async function addReaction(messageId, emoji) {
    let msg = messages.find(m=>m.id===messageId);
    if(!msg) return;
    let reactions = msg.reactions || {};
    if(!reactions[emoji]) reactions[emoji]=[];
    let idx = reactions[emoji].indexOf(currentUser.id);
    if(idx===-1) reactions[emoji].push(currentUser.id);
    else reactions[emoji].splice(idx,1);
    if(reactions[emoji].length===0) delete reactions[emoji];
    await supabase.from('messages').update({ reactions }).eq('id', messageId);
    msg.reactions = reactions;
    renderMessages();
}

async function sendFriendRequest(toUsername){
    let toUser = users.find(u=>u.username===toUsername);
    if(!toUser){ showToast('Пользователь не найден',2000,'error'); return; }
    if(toUser.id===currentUser.id){ showToast('Нельзя добавить себя',2000,'error'); return; }
    if(currentUser.friends.includes(toUser.id)){ showToast('Уже в друзьях',2000,'error'); return; }
    if(friendRequests.some(r=>r.from_user===currentUser.id && r.to_user===toUser.id && r.status==='pending')){ showToast('Заявка уже отправлена',2000,'error'); return; }
    let req = { id: generateId(), from_user: currentUser.id, to_user: toUser.id, status: 'pending', date: Date.now() };
    await supabase.from('friend_requests').insert([req]);
    friendRequests.push(req);
    showToast('Заявка отправлена',2000,'success');
}
async function acceptFriendRequest(userId){
    let req = friendRequests.find(r=>r.to_user===currentUser.id && r.from_user===userId && r.status==='pending');
    if(!req) return;
    await supabase.from('friend_requests').update({ status: 'accepted' }).eq('id', req.id);
    req.status = 'accepted';
    currentUser.friends.push(userId);
    let other = users.find(u=>u.id===userId);
    other.friends.push(currentUser.id);
    await supabase.from('profiles').update({ friends: currentUser.friends }).eq('id', currentUser.id);
    await supabase.from('profiles').update({ friends: other.friends }).eq('id', other.id);
    renderChatsList();
    showToast('Друг добавлен',2000,'success');
}
async function rejectFriendRequest(userId){
    let req = friendRequests.find(r=>r.to_user===currentUser.id && r.from_user===userId && r.status==='pending');
    if(req){
        await supabase.from('friend_requests').delete().eq('id', req.id);
        friendRequests = friendRequests.filter(r=>r.id !== req.id);
        renderChatsList();
    }
}

function showDrawingCanvas(onSave) {
    const overlay = document.createElement('div'); overlay.className = 'modal-overlay active';
    overlay.innerHTML = `<div class="modal-card"><h2>Нарисовать стикер</h2><canvas id="drawCanvas" width="500" height="500" style="border:2px solid #ff8c42; border-radius:20px; background:white; cursor:crosshair; width:100%; max-width:500px; height:auto;"></canvas><div class="draw-tools"><input type="color" id="drawColor" value="#000000"><input type="range" id="brushSize" min="2" max="40" value="8"><span id="sizeValue">8px</span><button id="toggleEraser" class="secondary">🧽 Ластик</button><button id="clearCanvas" class="secondary">Очистить</button><button id="undoDraw" class="secondary">↩ Отменить</button></div><div class="modal-actions"><button class="primary" id="saveDrawing">Сохранить стикер</button><button class="secondary" id="cancelDrawing">Отмена</button></div></div>`;
    document.body.appendChild(overlay);
    const canvas = document.getElementById('drawCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 500; canvas.height = 500;
    ctx.fillStyle = 'white'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    let drawing = false; let lastX = 0, lastY = 0; let color = '#000000'; let brushSize = 8; let eraserMode = false; let history = [];
    function saveState() { history.push(canvas.toDataURL()); if(history.length > 20) history.shift(); }
    saveState();
    function redraw(stateUrl) { let img = new Image(); img.src = stateUrl; img.onload = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0); }; }
    function draw(x, y) {
        ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(x, y);
        ctx.strokeStyle = eraserMode ? '#FFFFFF' : color;
        ctx.lineWidth = brushSize; ctx.lineCap = 'round'; ctx.stroke();
        [lastX, lastY] = [x, y];
    }
    canvas.onmousedown = (e) => {
        drawing = true; const rect = canvas.getBoundingClientRect(); const scaleX = canvas.width / rect.width; const scaleY = canvas.height / rect.height;
        let x = (e.clientX - rect.left) * scaleX; let y = (e.clientY - rect.top) * scaleY;
        x = Math.min(Math.max(0, x), canvas.width); y = Math.min(Math.max(0, y), canvas.height);
        lastX = x; lastY = y;
        ctx.beginPath(); ctx.arc(x, y, brushSize/2, 0, 2*Math.PI);
        ctx.fillStyle = eraserMode ? '#FFFFFF' : color; ctx.fill();
        saveState();
    };
    canvas.onmousemove = (e) => {
        if(!drawing) return; const rect = canvas.getBoundingClientRect(); const scaleX = canvas.width / rect.width; const scaleY = canvas.height / rect.height;
        let x = (e.clientX - rect.left) * scaleX; let y = (e.clientY - rect.top) * scaleY;
        x = Math.min(Math.max(0, x), canvas.width); y = Math.min(Math.max(0, y), canvas.height);
        draw(x, y);
    };
    canvas.onmouseup = () => { drawing = false; saveState(); };
    canvas.onmouseleave = () => { drawing = false; };
    document.getElementById('drawColor').oninput = (e) => { color = e.target.value; eraserMode = false; };
    document.getElementById('brushSize').oninput = (e) => { brushSize = parseInt(e.target.value); document.getElementById('sizeValue').innerText = brushSize+'px'; };
    document.getElementById('toggleEraser').onclick = () => { eraserMode = !eraserMode; document.getElementById('toggleEraser').style.background = eraserMode ? '#555' : '#ff8c42'; };
    document.getElementById('clearCanvas').onclick = () => { ctx.fillStyle = 'white'; ctx.fillRect(0, 0, canvas.width, canvas.height); saveState(); };
    document.getElementById('undoDraw').onclick = () => { if(history.length > 1) { history.pop(); redraw(history[history.length-1]); } else showToast('Нечего отменять',1000); };
    document.getElementById('saveDrawing').onclick = () => { const dataUrl = canvas.toDataURL('image/png'); onSave(dataUrl); overlay.remove(); };
    document.getElementById('cancelDrawing').onclick = () => overlay.remove();
}

async function uploadVoiceBlob(blob) {
    const file = new File([blob], `voice_${Date.now()}.webm`, { type: 'audio/webm' });

function initVoiceRecorder() {
    const recordBtn = document.getElementById('recordBtn');
    if(!recordBtn) return;
    recordBtn.onmousedown = () => {
        pressTimer = setTimeout(() => {
            if(isRecording) return;
            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    let publicUrl = '';
                    try {
                        publicUrl = await uploadVoiceBlob(blob);
                    } catch(e) { showToast('Ошибка загрузки голосового',3000,'error'); stream.getTracks().forEach(t=>t.stop()); isRecording=false; recordBtn.classList.remove('recording'); return; }
                    if(activeChatId || activeGroupId || activeChannelId){
                        let msgData = { id: generateId(), sender_id: currentUser.id, text: publicUrl, type: 'voice', timestamp: Date.now(), read_by: [currentUser.id], reactions: {}, mentions: [] };
                        if(activeChatId) msgData.chat_id = activeChatId;
                        else if(activeGroupId) msgData.group_id = activeGroupId;
                        else if(activeChannelId) msgData.channel_id = activeChannelId;
                        await supabase.from('messages').insert([msgData]);
                        renderMessages();
                    }
                    stream.getTracks().forEach(t => t.stop());
                    isRecording = false;
                    recordBtn.classList.remove('recording');
                };
                mediaRecorder.start();
                isRecording = true;
                recordBtn.classList.add('recording');
            }).catch(() => showToast('Нет доступа к микрофону', 2000, 'error'));
        }, 200);
    };
    recordBtn.onmouseup = recordBtn.onmouseleave = () => {
        clearTimeout(pressTimer);
        if(isRecording && mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
    };
}

async function enterCanvasRoom(roomId) {
    let room = canvasRoomData[roomId];
    if(!room){
        const { data } = await supabase.from('canvas_rooms').select('*').eq('id', roomId).single();
        if(data) room = data;
        else { showToast('Комната не найдена',2000,'error'); return; }
        canvasRoomData[roomId] = room;
    }
    if(!room.participants.find(p => p.id === currentUser.id)) {
        room.participants.push({ id: currentUser.id, name: currentUser.name, username: currentUser.username, reports: 0 });
        await supabase.from('canvas_rooms').update({ participants: room.participants }).eq('id', roomId);
    }
    activeCanvasRoom = roomId;
    renderCanvasRoomUI();
    syncCanvasRoomData();
    startCanvasSync();
}
function startCanvasSync() {
    const canvas = document.getElementById('collabCanvas');
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    let drawing = false;
    let lastX = 0, lastY = 0;
    let brushColor = '#000000';
    let brushSize = 5;
    let tool = 'brush';
    const updateBrushFromUI = () => {
        const colorPicker = document.getElementById('canvasColor');
        const sizeSlider = document.getElementById('canvasSize');
        const toolSelect = document.getElementById('canvasTool');
        if(colorPicker) brushColor = colorPicker.value;
        if(sizeSlider) brushSize = parseInt(sizeSlider.value);
        if(toolSelect) tool = toolSelect.value;
    };
    const drawPoint = (x, y) => {
        ctx.beginPath();
        ctx.arc(x, y, brushSize/2, 0, 2*Math.PI);
        if(tool === 'eraser') ctx.fillStyle = '#FFFFFF';
        else ctx.fillStyle = brushColor;
        ctx.fill();
    };
    const drawLine = (fromX, fromY, toX, toY) => {
        ctx.beginPath();
        ctx.moveTo(fromX, fromY);
        ctx.lineTo(toX, toY);
        if(tool === 'eraser') ctx.strokeStyle = '#FFFFFF';
        else ctx.strokeStyle = brushColor;
        ctx.lineWidth = brushSize;
        ctx.lineCap = 'round';
        ctx.stroke();
    };
    const sendAction = async () => {
        const imageData = canvas.toDataURL();
        await supabase.from('canvas_rooms').update({ canvas_image: imageData }).eq('id', activeCanvasRoom);
        if(canvasRoomData[activeCanvasRoom]) canvasRoomData[activeCanvasRoom].canvas_image = imageData;
    };
    canvas.onmousedown = (e) => {
        drawing = true;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let x = (e.clientX - rect.left) * scaleX;
        let y = (e.clientY - rect.top) * scaleY;
        x = Math.min(Math.max(0, x), canvas.width);
        y = Math.min(Math.max(0, y), canvas.height);
        lastX = x; lastY = y;
        drawPoint(x, y);
        sendAction();
    };
    canvas.onmousemove = (e) => {
        if(!drawing) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let x = (e.clientX - rect.left) * scaleX;
        let y = (e.clientY - rect.top) * scaleY;
        x = Math.min(Math.max(0, x), canvas.width);
        y = Math.min(Math.max(0, y), canvas.height);
        drawLine(lastX, lastY, x, y);
        sendAction();
        lastX = x; lastY = y;
    };
    canvas.onmouseup = () => { drawing = false; };
    canvas.onmouseleave = () => { drawing = false; };
    document.getElementById('clearCanvasBtn')?.addEventListener('click', async () => {
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        await supabase.from('canvas_rooms').update({ canvas_image: canvas.toDataURL() }).eq('id', activeCanvasRoom);
        sendAction();
    });
    const updateLocalControls = () => {
        const colorPicker = document.getElementById('canvasColor');
        const sizeSlider = document.getElementById('canvasSize');
        const toolSelect = document.getElementById('canvasTool');
        if(colorPicker) colorPicker.oninput = updateBrushFromUI;
        if(sizeSlider) sizeSlider.oninput = updateBrushFromUI;
        if(toolSelect) toolSelect.onchange = updateBrushFromUI;
    };
    updateLocalControls();
    updateBrushFromUI();
    const savedImg = canvasRoomData[activeCanvasRoom]?.canvas_image;
    if(savedImg) {
        const img = new Image();
        img.onload = () => ctx.drawImage(img, 0, 0);
        img.src = savedImg;
    } else {
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
}
async function syncCanvasRoomData() {
    if(!activeCanvasRoom || !canvasRoomData[activeCanvasRoom]) return;

async function reportUser(targetId) {
    if(targetId === currentUser.id) { showToast('Нельзя репортнуть себя',2000,'error'); return; }
    const room = canvasRoomData[activeCanvasRoom];
    if(!room) return;
    const target = room.participants.find(p => p.id === targetId);
    if(target) {
        target.reports = (target.reports || 0) + 1;
        await supabase.from('canvas_rooms').update({ participants: room.participants }).eq('id', activeCanvasRoom);
        showToast(`Репорт на ${target.name} отправлен. Всего репортов: ${target.reports}`, 3000);
        syncCanvasRoomData();
        if(target.reports >= 3) {
            room.participants = room.participants.filter(p => p.id !== targetId);
            await supabase.from('canvas_rooms').update({ participants: room.participants }).eq('id', activeCanvasRoom);
            showToast(`${target.name} был кикнут за много репортов`, 4000, 'error');
            syncCanvasRoomData();
        }
    }
}
async function voteKick(targetId) {
    if(targetId === currentUser.id) return;
    const room = canvasRoomData[activeCanvasRoom];
    if(!room) return;
    if(!room.votes[targetId]) room.votes[targetId] = [];
    if(room.votes[targetId].includes(currentUser.id)) { showToast('Вы уже голосовали',2000,'error'); return; }
    room.votes[targetId].push(currentUser.id);
    await supabase.from('canvas_rooms').update({ votes: room.votes }).eq('id', activeCanvasRoom);
    const totalParticipants = room.participants.length - 1;
    const votesNeeded = Math.ceil(totalParticipants / 2);
    if(room.votes[targetId].length >= votesNeeded && votesNeeded > 0) {
        room.participants = room.participants.filter(p => p.id !== targetId);
        delete room.votes[targetId];
        await supabase.from('canvas_rooms').update({ participants: room.participants, votes: room.votes }).eq('id', activeCanvasRoom);
        showToast(`Участник ${getUser(targetId)?.name} был кикнут`, 4000, 'info');
        syncCanvasRoomData();
    } else {
        showToast(`Голос за кик принят. Нужно еще ${votesNeeded - room.votes[targetId].length} голосов`, 2000);
        syncCanvasRoomData();
    }
}

function escapeHtml(str) {
    if(!str) return '';
    return str.replace(/[&<>]/g, function(m){
        if(m === '&') return '&amp;';
        if(m === '<') return '&lt;';
        if(m === '>') return '&gt;';
        return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
        return c;
    });
}

        const chat = chats.find(c => c.id === activeChatId);
        if (!chat) return;
        const otherId = chat.participants.find(p => p !== currentUser.id);
        const other = getUser(otherId);
        if (!other) return;
        if (currentUser.blocked_users?.includes(other.id)) { area.innerHTML = '<div style="padding:20px;text-align:center;">Вы заблокировали этого пользователя</div>'; nameEl.innerHTML = escapeHtml(other.name); metaEl.innerText = '@' + escapeHtml(other.username); inputArea.style.display = 'none'; return; }
        if (other.blocked_users?.includes(currentUser.id)) { area.innerHTML = '<div style="padding:20px;text-align:center;">Пользователь заблокировал вас</div>'; nameEl.innerHTML = escapeHtml(other.name); metaEl.innerText = '@' + escapeHtml(other.username); inputArea.style.display = 'none'; return; }
        nameEl.innerHTML = escapeHtml(other.name);
        metaEl.innerText = '@' + escapeHtml(other.username);
        let msgs = messages.filter(m => m.chat_id === activeChatId).sort((a,b)=>a.timestamp - b.timestamp);
        msgs = msgs.filter(m => !currentUser.blocked_users?.includes(m.sender_id));
        area.innerHTML = msgs.map(m => renderMessageHtml(m)).join('');
        attachMessageEvents();
        area.scrollTop = area.scrollHeight;
    } else if (activeGroupId) {
        const group = groups.find(g => g.id === activeGroupId);
        if (!group) return;
        nameEl.innerText = escapeHtml(group.name); metaEl.innerText = 'Участников: ' + group.participants.length;
        let msgs = messages.filter(m => m.group_id === activeGroupId).sort((a,b)=>a.timestamp - b.timestamp);
        msgs = msgs.filter(m => !currentUser.blocked_users?.includes(m.sender_id));
        area.innerHTML = msgs.map(m => renderMessageHtml(m)).join('');
        attachMessageEvents();
        area.scrollTop = area.scrollHeight;
    } else if (activeChannelId) {
        const channel = channels.find(c => c.id === activeChannelId);
        if (!channel) return;
        if (!channel.subscribers?.includes(currentUser.id)) { area.innerHTML = '<div style="padding:20px;text-align:center;">Вы не подписаны на этот канал</div>'; nameEl.innerHTML = escapeHtml(channel.name); metaEl.innerText = '@' + escapeHtml(channel.username); inputArea.style.display = 'none'; return; }
        nameEl.innerHTML = escapeHtml(channel.name) + (channel.is_private ? ' <i class="fas fa-lock"></i>' : '');
        metaEl.innerText = '@' + escapeHtml(channel.username);
        let msgs = messages.filter(m => m.channel_id === activeChannelId).sort((a,b)=>a.timestamp - b.timestamp);
        msgs = msgs.filter(m => !currentUser.blocked_users?.includes(m.sender_id));
        area.innerHTML = msgs.map(m => renderMessageHtml(m)).join('');
        attachMessageEvents();
        area.scrollTop = area.scrollHeight;
    }
    updateTitleUnread();
}

function setTheme(theme, custom=null) {
    document.body.classList.remove('dark-theme','blue-theme','green-theme','custom-theme');
    if(theme==='dark') document.body.classList.add('dark-theme');
    else if(theme==='blue') document.body.classList.add('blue-theme');
    else if(theme==='green') document.body.classList.add('green-theme');
    else if(theme==='custom' && custom){
        document.body.classList.add('custom-theme');
        document.documentElement.style.setProperty('--bg-color', custom.bgColor);
        document.documentElement.style.setProperty('--text-color', custom.textColor);
        document.documentElement.style.setProperty('--accent-color', custom.accentColor);
        document.documentElement.style.setProperty('--sidebar-bg', custom.sidebarBg);
        document.documentElement.style.setProperty('--message-own-bg', custom.messageOwnBg);
        document.documentElement.style.setProperty('--message-other-bg', custom.messageOtherBg);
    }
    currentTheme = theme;
    localStorage.setItem('nova_theme', theme);
    if(custom) localStorage.setItem('nova_customTheme', JSON.stringify(custom));
    else localStorage.removeItem('nova_customTheme');
}
function renderImagePreviews() {
    let container = document.getElementById('imagePreviews');
    if(!container) return;
    if(pendingImages.length===0){ container.innerHTML=''; container.classList.remove('image-previews'); return; }
    container.classList.add('image-previews');
    let html='';
    pendingImages.forEach((img,idx)=>{ html+=`<div class="preview-item" data-index="${idx}"><img src="${img.dataUrl}"><div class="preview-actions"><button class="preview-btn rotate-btn" title="Повернуть"><i class="fas fa-undo-alt"></i></button><button class="preview-btn remove-btn" title="Удалить"><i class="fas fa-times"></i></button></div></div>`; });
    container.innerHTML=html;
    document.querySelectorAll('.rotate-btn').forEach(btn=>{ btn.onclick=(e)=>{ let item=e.target.closest('.preview-item'); let idx=item.dataset.index; rotateImage(parseInt(idx)); }; });
    document.querySelectorAll('.remove-btn').forEach(btn=>{ btn.onclick=(e)=>{ let item=e.target.closest('.preview-item'); let idx=item.dataset.index; pendingImages.splice(parseInt(idx),1); renderImagePreviews(); }; });
}
function rotateImage(idx) {
    let img=pendingImages[idx];
    if(!img) return;
    let canvas=document.createElement('canvas');
    let ctx=canvas.getContext('2d');
    let image=new Image();
    image.src=img.dataUrl;
    image.onload=()=>{ canvas.width=image.height; canvas.height=image.width; ctx.translate(canvas.width/2,canvas.height/2); ctx.rotate(90*Math.PI/180); ctx.drawImage(image,-image.width/2,-image.height/2); let rotated=canvas.toDataURL('image/jpeg',0.9); pendingImages[idx].dataUrl=rotated; renderImagePreviews(); };
}
function initVoiceCommands() {
    if(!('webkitSpeechRecognition' in window)) return;
    recognition = new webkitSpeechRecognition();
    recognition.continuous = false; recognition.lang = 'ru-RU';
    recognition.onresult = (e) => {
        const cmd = e.results[0][0].transcript.toLowerCase();
        executeVoiceCommand(cmd);
    };
}
function startVoiceCommand() { if(recognition) recognition.start(); }
function executeVoiceCommand(cmd) {
    if(cmd.includes('открыть чат с')){ let name = cmd.split('с')[1]?.trim(); let user = users.find(u=>u.name.toLowerCase().includes(name)); if(user) startChatWithUser(user.id); }
    else if(cmd.includes('отправить')){ let parts = cmd.split('"'); if(parts.length>1) document.getElementById('messageInput').value = parts[1]; sendMessage(); }
    else if(cmd.includes('поставить реакцию огонь')){ let lastMsg = [...messages].reverse().find(m=>m.chat_id===activeChatId); if(lastMsg) addReaction(lastMsg.id,'🔥'); }
    else if(cmd.includes('удалить последнее сообщение')){ let last = [...messages].reverse().find(m=>m.chat_id===activeChatId && m.sender_id===currentUser.id); if(last){ deleteMessage(last.id); showToast('Удалено',1000); } }
    else showToast('Команда не распознана',2000);
}

                        <button class="attach-btn" id="attachBtn"><i class="fas fa-paperclip"></i></button>
                        <button class="emoji-btn" id="emojiBtn"><i class="fas fa-smile"></i></button>
                        <button class="sticker-btn" id="stickerBtn"><i class="fas fa-sticky-note"></i></button>
                        <button class="calendar-btn" id="calendarBtn"><i class="fas fa-calendar-alt"></i></button>
                        <button class="voice-cmd-btn" id="voiceCmdBtn"><i class="fas fa-microphone-alt"></i></button>
                        <button class="canvas-room-btn" id="canvasRoomChatBtn"><i class="fas fa-paintbrush"></i></button>
                        <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                        <button class="record-btn" id="recordBtn"><i class="fas fa-microphone"></i></button>
                    </div>
                    <div id="imagePreviews" class="image-previews"></div>
                    <div id="emojiPicker" class="emoji-picker" style="display: none;"></div>
                    <div id="stickerPicker" class="sticker-picker" style="display: none;"><div id="stickerList"></div><button id="manageStickersBtn" class="secondary" style="margin-top:10px;">Управлять стикерами</button></div>
                </div>
            </div>
        </div>
    `;
    document.getElementById('profileBtn').onclick = showProfileModal;
    document.getElementById('searchBtn').onclick = () => { const cont = document.getElementById('searchContainer'); cont.style.display = cont.style.display === 'none' ? 'block' : 'none'; };
    document.getElementById('addChatBtn').onclick = () => { showCreateChatModal(); };
    document.getElementById('settingsBtn').onclick = showSettingsModal;
    document.getElementById('canvasRoomBtn').onclick = createCanvasRoom;
    document.getElementById('canvasRoomChatBtn') && (document.getElementById('canvasRoomChatBtn').onclick = createCanvasRoom);
    document.querySelectorAll('.tab-btn').forEach(btn => { btn.onclick = () => { activeTab = btn.dataset.tab; renderApp(); }; });
    document.getElementById('backButton').onclick = () => { activeChatId = null; activeGroupId = null; activeChannelId = null; renderApp(); };
    document.getElementById('searchMessagesBtn') && (document.getElementById('searchMessagesBtn').onclick = showSearchMessagesModal);
    document.getElementById('groupInfoBtn') && (document.getElementById('groupInfoBtn').onclick = () => { if(activeGroupId) showGroupInfo(groups.find(g=>g.id===activeGroupId)); });
    document.getElementById('attachBtn').onclick = () => { document.getElementById('fileInput')?.click(); };
    const fileInput = document.createElement('input'); fileInput.type = 'file'; fileInput.multiple = true; fileInput.accept = 'image/*'; fileInput.id = 'fileInput'; fileInput.style.display = 'none'; document.body.appendChild(fileInput);
    fileInput.onchange = (e) => {
        for(let file of e.target.files){
            const reader = new FileReader();
            reader.onload = (ev) => { pendingImages.push({ dataUrl: ev.target.result, file: file }); renderImagePreviews(); };
            reader.readAsDataURL(file);
        }
        fileInput.value = '';
    };
    document.getElementById('emojiBtn').onclick = () => { const picker = document.getElementById('emojiPicker'); picker.style.display = picker.style.display === 'none' ? 'flex' : 'none'; if(picker.style.display === 'flex'){ picker.innerHTML = '😀 😃 😄 😁 😆 😅 😂 🤣 😊 😇 🙂 🙃 😉 😌 😍 🥰 😘 😗 😙 😚 😋 😛 😝 😜 🤪 🤨 🧐 🤓 😎 🤩 🥳 😏 😒 😞 😔 😟 😕 🙁 ☹️ 😣 😖 😫 😩 🥺 😢 😭 😤 😠 😡 🤬 🤯 😳 🥵 🥶 😱 😨 😰 😥 😓 🤗 🤔 🤭 🤫 🤥 😶 😐 😑 😬 🙄 😯 😦 😧 😮 😲 🥱 😴 🤤 😪 😵 🤐 🥴 🤢 🤮 🤧 😷 🤒 🤕 🩸 🤑 🤠 😈 👿 👹 👺 🤡 💩 👻 💀 ☠️ 👽 👾 🤖 🎃 😺 😸 😹 😻 😼 😽 🙀 😿 😾'.split(' ').map(e=>`<span class="emoji-item">${e}</span>`).join(''); document.querySelectorAll('.emoji-item').forEach(el=>{ el.onclick=()=>{ const input=document.getElementById('messageInput'); input.value+=el.innerText; picker.style.display='none'; }; }); } };
    document.getElementById('stickerBtn').onclick = () => { const picker = document.getElementById('stickerPicker'); picker.style.display = picker.style.display === 'none' ? 'block' : 'none'; if(picker.style.display === 'block') renderStickerPicker(); };
    document.getElementById('manageStickersBtn') && (document.getElementById('manageStickersBtn').onclick = showStickerManager);
    document.getElementById('calendarBtn').onclick = () => { if(activeChatId) createEventInvite(activeChatId); else showToast('Выберите чат',2000,'error'); };
    document.getElementById('voiceCmdBtn').onclick = startVoiceCommand;
    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('messageInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
    initVoiceRecorder();
    initVoiceCommands();
    renderChatsList();
    renderMessages();
    if(activeChatId || activeGroupId || activeChannelId) document.getElementById('backButton').style.display = 'block';
    if(activeGroupId) document.getElementById('groupInfoBtn').style.display = 'inline-block';
}
const savedTheme = localStorage.getItem('nova_theme') || 'light';
const savedCustom = JSON.parse(localStorage.getItem('nova_customTheme') || 'null');
setTheme(savedTheme, savedCustom);
initSupabase();
</script>
